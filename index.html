<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Djeff Merzier — Language Dashboard</title>
  <style>
    :root {
      --bg: #0d0e12;
      --card-bg: #161822;
      --border: #24273a;
      --text: #cdd6f4;
      --text-muted: #7f849c;
      --blue: #89b4fa;
      --teal: #94e2d5;
      --purple: #cba6f7;
      --pink: #f5c2e7;
      --amber: #f9e2af;
      --green: #a6e3a1;
      --accent: #b4befe;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
    body { background: var(--bg); color: var(--text); padding: 20px; padding-bottom: 80px; }
    header { max-width: 800px; margin: 0 auto 24px; text-align: center; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
    .subtitle { color: var(--text-muted); font-size: 14px; }
    
    .nav-tabs { display: flex; max-width: 800px; margin: 0 auto 20px; background: var(--card-bg); padding: 4px; border-radius: 12px; border: 1px solid var(--border); }
    .nav-tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: all 0.2s; }
    .nav-tab.active { background: var(--border); color: var(--text); }

    .control-panel { max-width: 800px; margin: 0 auto 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: space-between; align-items: center; }
    .sub-tabs { display: flex; gap: 6px; overflow-x: auto; white-space: nowrap; padding-bottom: 4px; }
    .sub-tab { background: var(--card-bg); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; }
    .sub-tab.active { background: var(--border); color: var(--text); }
    
    .btn-action { background: var(--card-bg); border: 1px solid var(--border); color: var(--accent); padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .btn-action:hover { background: var(--border); }

    .progress-wrap { max-width: 800px; margin: 0 auto 20px; background: var(--card-bg); border: 1px solid var(--border); padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .progress-info { font-size: 13px; font-weight: 600; white-space: nowrap; }
    .progress-bar-bg { flex: 1; background: var(--border); height: 8px; border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { background: var(--green); height: 100%; width: 0%; transition: width 0.3s ease; }

    .grid { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 12px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 16px; position: relative; transition: border-color 0.2s; cursor: pointer; }
    .card:hover { border-color: #313244; }
    .card-sp { font-size: 16px; font-weight: 500; line-height: 1.5; margin-bottom: 6px; color: var(--text); }
    .card-sp em { color: var(--em-color, var(--blue)); font-style: normal; font-weight: 700; }
    .card-en { font-size: 14px; color: var(--text-muted); line-height: 1.4; }
    .card-en.blur { filter: blur(5px); user-select: none; }
    
    .badge { position: absolute; top: 16px; right: 16px; width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .card.learned .badge { background: var(--green); }

    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13,14,18,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .overlay.active { display: flex; }
    .quiz-box { background: var(--card-bg); border: 1px solid var(--border); width: 100%; max-width: 500px; border-radius: 20px; padding: 24px; position: relative; text-align: center; }
    .quiz-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .quiz-main { min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 24px; }
    .quiz-sp { font-size: 18px; font-weight: 600; margin-bottom: 12px; line-height: 1.5; }
    .quiz-en { font-size: 15px; color: var(--text-muted); line-height: 1.5; min-height: 22px; }
    .quiz-en.blur { filter: blur(6px); cursor: pointer; background: rgba(255,255,255,0.03); border-radius: 4px; padding: 2px 8px; }
    .quiz-footer { display: flex; gap: 10px; }
    .quiz-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; font-weight: 600; cursor: pointer; background: var(--card-bg); color: var(--text); }
    .quiz-btn.primary { background: var(--accent); color: var(--bg); border: none; }
    .quiz-close { position: absolute; top: -40px; right: 0; color: var(--text-muted); font-size: 14px; cursor: pointer; font-weight: 600; }

    @media (max-width: 600px) {
      body { padding: 12px; padding-bottom: 80px; }
      .control-panel { flex-direction: column; align-items: stretch; gap: 12px; }
      .sub-tabs { width: 100%; }
      .btn-action { justify-content: center; }
    }
  </style>
</head>

  </div>

      renderSubTabs();
      renderCards();
    }

    function renderSubTabs() {
      const container = document.getElementById('subTabsContainer');
      container.innerHTML = '';
      
      if (currentMode === 'verbs') {
        Object.keys(VERBS).forEach(vKey => {
          const btn = document.createElement('div');
          btn.className = `sub-tab ${currentVerb === vKey ? 'active' : ''}`;
          btn.textContent = VERBS[vKey].title;
          btn.onclick = () => { currentVerb = vKey; renderSubTabs(); renderCards(); };
          container.appendChild(btn);
        });
      } else {
        const btnAll = document.createElement('div');
        btnAll.className = `sub-tab ${rizzFilter === 'all' ? 'active' : ''}`;
        btnAll.textContent = 'Todos';
        btnAll.onclick = () => { rizzFilter = 'all'; renderSubTabs(); renderCards(); };
        container.appendChild(btnAll);

        Object.keys(RIZZ).forEach(sKey => {
          const btn = document.createElement('div');
          btn.className = `sub-tab ${rizzFilter === sKey ? 'active' : ''}`;
          btn.textContent = RIZZ[sKey].title;
          btn.onclick = () => { rizzFilter = sKey; renderSubTabs(); renderCards(); };
          container.appendChild(btn);
        });
      }
    }

    function renderCards() {
      const grid = document.getElementById('cardGrid');
      grid.innerHTML = '';

      if (currentMode === 'verbs') {
        const verbData = VERBS[currentVerb];
        Object.keys(verbData.sections).forEach(sKey => {
          const section = verbData.sections[sKey];
          section.data.forEach(item => {
            grid.appendChild(createCardElement(item[0], item[1], verbData.color, learnedV, 'verb'));
          });
        });
      } else {
        Object.keys(RIZZ).forEach(sKey => {
          if (rizzFilter !== 'all' && rizzFilter !== sKey) return;
          RIZZ[sKey].data.forEach(item => {
            grid.appendChild(createCardElement(item[0], item[1], 'var(--accent)', learnedR, 'rizz'));
          });
        });
      }
    }

    function createCardElement(sp, en, col, storageSet, type) {
      const card = document.createElement('div');
      card.className = `card ${storageSet.has(sp) ? 'learned' : ''}`;
      card.style.setProperty('--em-color', col);
      
      const showBlur = type === 'verb' ? !showTransV : !showTransR;
      
      card.innerHTML = `
        <div class="badge"></div>
        <div class="card-sp">${sp}</div>
        <div class="card-en ${showBlur ? 'blur' : ''}">${en}</div>
      `;
      
      card.onclick = (e) => {
        if (e.target.classList.contains('card-en') && e.target.classList.contains('blur')) {
          e.target.classList.remove('blur');
          return;
        }
        if (storageSet.has(sp)) {
          storageSet.delete(sp);
          card.classList.remove('learned');
        } else {
          storageSet.add(sp);
          card.classList.add('learned');
        }
        updateStats();
      };
      return card;
    }

    function toggleTranslations() {
      if (currentMode === 'verbs') showTransV = !showTransV;
      else showTransR = !showTransR;
      renderCards();
    }

    function updateStats() {
      const totalCount = learnedV.size + learnedR.size;
      document.getElementById('learnedCount').textContent = totalCount;
      
      let maxItems = 0;
      Object.keys(VERBS).forEach(v => Object.keys(VERBS[v].sections).forEach(s => maxItems += VERBS[v].sections[s].data.length));
      Object.keys(RIZZ).forEach(s => maxItems += RIZZ[s].data.length);
      
      const pct = maxItems > 0 ? (totalCount / maxItems) * 100 : 0;
      document.getElementById('progressBar').style.width = `${pct}%`;

      localStorage.setItem('learnedV', JSON.stringify([...learnedV]));
      localStorage.setItem('learnedR', JSON.stringify([...learnedR]));
    }

    // ══════════════════════════════════════════
    // BI-DIRECTIONAL REVERSE QUIZ ENGINE
    // ══════════════════════════════════════════
    function startQuiz() {
      quizPool = [];
      quizIdx = 0;
      quizIsVerb = (currentMode === 'verbs');

      if (quizIsVerb) {
        const verbData = VERBS[currentVerb];
        Object.keys(verbData.sections).forEach(sKey => {
          verbData.sections[sKey].data.forEach(item => quizPool.push({sp: item[0], en: item[1]}));
        });
      } else {
        Object.keys(RIZZ).forEach(sKey => {
          if (rizzFilter !== 'all' && rizzFilter !== sKey) return;
          RIZZ[sKey].data.forEach(item => quizPool.push({sp: item[0], en: item[1]}));
        });
      }

      if (quizPool.length === 0) return;
      
      quizPool.sort(() => Math.random() - 0.5);
      
      quizDirection = confirm("¿Quieres activar el modo reverso?\n\n(Aceptar = Inglés a Español)\n(Cancelar = Español a Inglés)") ? 'EN_SP' : 'SP_EN';
      
      const titleStr = quizIsVerb ? VERBS[currentVerb].title.toUpperCase() : 'RIZZ CONVERSACIONAL';
      document.getElementById('quizLabel').textContent = `QUIZ: ${titleStr} ${quizDirection === 'EN_SP' ? '(REVERSO)' : ''}`;
      document.getElementById('quizTotal').textContent = quizPool.length;
      
      showQuizCard();
      document.getElementById('quizOverlay').classList.add('active');
    }

    function showQuizCard() {
      if (quizIdx >= quizPool.length) { closeQuiz(); return; }
      const q = quizPool[quizIdx];
      const pEl = document.getElementById('quizSpanish');
      const tEl = document.getElementById('quizEnglish');
      
      if (quizDirection === 'SP_EN') {
        pEl.innerHTML = q.sp;
        tEl.textContent = q.en;
        tEl.className = "quiz-en blur";
      } else {
        pEl.innerHTML = q.en;
        tEl.innerHTML = q.sp.replace(/<\/?[^>]+(>|$)/g, "");
        tEl.className = "quiz-en blur";
      }
      
      document.getElementById('quizIdx').textContent = quizIdx + 1;
    }

    function revealQuiz() {
      document.getElementById('quizEnglish').classList.remove('blur');
      const q = quizPool[quizIdx];
      if (q) {
        if (quizIsVerb) learnedV.add(q.sp);
        else learnedR.add(q.sp);
        updateStats();
        
        const cardElements = document.querySelectorAll('.card');
        cardElements.forEach(card => {
          if (card.querySelector('.card-sp').innerHTML === q.sp) {
            card.classList.add('learned');
          }
        });
      }
    }

    function nextQuizCard() {
      quizIdx++;
      showQuizCard();
    }

    function closeQuiz() {
      document.getElementById('quizOverlay').classList.remove('remove');
      document.getElementById('quizOverlay').classList.remove('active');
      renderCards();
    }

    window.onload = init;
  </script>
</body>
</html>
